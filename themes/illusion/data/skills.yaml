    projects: []
  - name: "CSS3"
    level: 90
    description: "熟练使用Flexbox、Grid布局，掌握CSS动画和响应式设计。"
    projects: []
  - name: "Python"
    level: 90
    description: "熟悉Django、Flask框架，掌握数据分析和机器学习基础。"
    projects:
