# 技能发展时间线
timeline:
  - year: "2022"
    title: "基础学习"
    description: "掌握HTML、CSS、JavaScript基础，完成第一个个人网站项目。"
  - year: "2023"
    title: "框架掌握"
    description: "学习Vue.js和React框架，参与团队项目开发，掌握前后端分离架构。"
  - year: "2024"
    title: "全栈发展"
    description: "学习Node.js和Python后端开发，掌握数据库设计和API开发。"
  - year: "2025"
    title: "移动开发"
    description: "学习Flutter跨平台开发，完成多个移动应用项目。"
  - year: "2026"
    title: "技术深化"
    description: "学习Rust语言，深入研究性能优化和系统架构设计。"