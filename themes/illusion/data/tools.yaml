# 工具网站配置
# 用于展示个人日常使用的效率工具
# 数据优先级: 根目录 data/tools.yaml > 主题 data/tools.yaml
# 页面开关: Site.Params.featuredPages.enableTools

page:
  title: "我的工具"
  subtitle: "日常使用的效率工具集合"
  enable: true

# 工具分类列表
categories:
  - name: "开发工具"
    icon: "fas fa-code"
    description: "编程开发相关的工具软件"
    tools:
      - name: "Visual Studio Code"
        url: "https://code.visualstudio.com"
        description: "强大的代码编辑器，支持多种编程语言"
        icon: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/visualstudiocode.svg"
        color: "#007ACC"

      - name: "Git"
        url: "https://git-scm.com"
        description: "分布式版本控制系统"
        icon: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/git.svg"
        color: "#F05032"

      - name: "Docker"
        url: "https://www.docker.com"
        description: "容器化平台"
        icon: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/docker.svg"
        color: "#2496ED"

      - name: "Postman"
        url: "https://www.postman.com"
        description: "API 测试和开发工具"
        icon: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/postman.svg"
        color: "#FF6C37"

  - name: "设计工具"
    icon: "fas fa-palette"
    description: "UI/UX 设计和图像处理工具"
    tools:
      - name: "Figma"
        url: "https://www.figma.com"
        description: "协作式 UI 设计工具"
        icon: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/figma.svg"
        color: "#F24E1E"

      - name: "Canva"
        url: "https://www.canva.com"
        description: "在线图形设计平台"
        icon: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/canva.svg"
        color: "#00C4CC"

  - name: "效率工具"
    icon: "fas fa-bolt"
    description: "提升工作效率的辅助工具"
    tools:
      - name: "Notion"
        url: "https://www.notion.so"
        description: "全能笔记和知识管理工具"
        icon: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/notion.svg"
        color: "#000000"

      - name: "Raycast"
        url: "https://raycast.com"
        description: "Mac 效率启动器"
        icon: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/raycast.svg"
        color: "#FF6363"

      - name: "Obsidian"
        url: "https://obsidian.md"
        description: "基于 Markdown 的双向链接笔记"
        icon: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/obsidian.svg"
        color: "#483699"

  - name: "在线服务"
    icon: "fas fa-cloud"
    description: "常用的在线服务和平台"
    tools:
      - name: "GitHub"
        url: "https://github.com"
        description: "代码托管和协作平台"
        icon: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg"
        color: "#181717"

      - name: "Vercel"
        url: "https://vercel.com"
        description: "前端部署平台"
        icon: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/vercel.svg"
        color: "#000000"

      - name: "Cloudflare"
        url: "https://www.cloudflare.com"
        description: "CDN 和网络安全服务"
        icon: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/cloudflare.svg"
        color: "#FAae40"