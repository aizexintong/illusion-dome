{{/* legal.html - 法律页面模板
     支持隐私政策、使用条款页面
     内容来自 content/privacy.md 和 content/terms.md 的 markdown 正文 */}}

{{ define "main" }}

<div class="section-content">
  <div class="container">
    <section class="page-header" data-aos="fade-up">
      <h1 class="page-title">{{ .Title }}</h1>
      <p class="page-description">{{ .Description }}</p>
    </section>

    <div class="legal-content" data-aos="fade-up">
      <div class="legal-card card">
        <div class="markdown-content">
          {{ .Content }}
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .legal-content {
    max-width: 800px;
    margin: 0 auto;
  }
  
  .legal-card {
    padding: var(--sp-8);
  }
  
  .legal-card h2 {
    font-size: var(--fs-xl);
    margin-top: var(--sp-8);
    margin-bottom: var(--sp-4);
    color: var(--c-text-main);
  }
  
  .legal-card h2:first-child {
    margin-top: 0;
  }
  
  .legal-card h3 {
    font-size: var(--fs-lg);
    margin-top: var(--sp-6);
    margin-bottom: var(--sp-3);
    color: var(--c-text-main);
  }
  
  .legal-card p {
    margin-bottom: var(--sp-4);
    line-height: 1.8;
    color: var(--c-text-muted);
  }
  
  .legal-card ul, .legal-card ol {
    margin-bottom: var(--sp-4);
    padding-left: var(--sp-6);
  }
  
  .legal-card li {
    margin-bottom: var(--sp-2);
    line-height: 1.8;
    color: var(--c-text-muted);
  }
  
  .legal-card a {
    color: var(--c-primary-400);
    text-decoration: none;
    border-bottom: 1px dashed var(--c-primary-300);
  }
  
  .legal-card a:hover {
    border-bottom-style: solid;
  }
</style>
{{ end }}
