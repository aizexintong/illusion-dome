# 布局配置
# 控制站点的布局和行为
# 数据优先级: 根目录 data/layout.yaml > 主题 data/layout.yaml

# ========== 首页英雄区域 ==========
hero:
  # 布局: centered (居中) | left (靠左) | right (靠右)
  layout: "centered"
  # 是否显示头像
  showAvatar: true
  # 是否显示标题
  showTitle: true
  # 是否显示副标题
  showSubtitle: true
  # 打字机效果（需要 enableTypewriter 开启）
  typewriter: true

# ========== 文章列表 ==========
posts:
  # 布局: grid (网格) | list (列表) | masonry (瀑布流)
  layout: "grid"
  # grid 模式下的列数（桌面端）
  columns: 2
  # 每页显示数量
  perPage: 12
  # 显示日期
  showDate: true
  # 显示分类
  showCategory: true
  # 显示标签
  showTags: true
  # 显示摘要
  showExcerpt: true
  # 摘要长度（字符数）
  excerptLength: 160

# ========== 技能页面 ==========
skills:
  # 布局: grid (网格) | list (列表) | radial (放射状)
  layout: "grid"
  # 是否显示分类概览
  showCategories: true
  # 是否显示详细技能
  showDetailed: true
  # 是否显示时间线
  showTimeline: true
  # 是否显示项目经验
  showProjects: true

# ========== 友链页面 ==========
links:
  # 是否显示申请友链区域
  showApply: true
  # 友链分类显示
  showCategory: true

# ========== 页脚 ==========
footer:
  # 布局: columns (多列) | simple (简洁) | social (社交)
  layout: "columns"
  # 显示版权信息
  showCopyright: true
  # 显示 "由 Hugo + Illusion 驱动"
  showPoweredBy: true
  # 显示社交链接
  showSocial: true
  # 显示快捷链接（使用 menus.footer）
  showQuickLinks: true

# ========== 侧边栏（文章页） ==========
sidebar:
  # 是否显示侧边栏
  enable: true
  # 侧边栏位置: right (右侧) | left (左侧)
  position: "right"
  # 显示目录
  showTOC: true
  # 显示文章信息
  showInfo: true
  # 显示标签
  showTags: true

# ========== 代码块 ==========
codeblock:
  # 显示语言标签
  showLang: true
  # 显示复制按钮
  showCopy: true
  # 默认展开行数（0 为不展开）
  expandLines: 0
  # 行号显示
  lineNumbers: false

# ========== 动画效果 ==========
animations:
  # 滚动动画（AOS）
  scroll: true
  # 粒子背景
  particles: true
  # 打字机效果
  typewriter: true
  # 3D 卡片效果
  card3D: true

# ========== SEO ==========
seo:
  # Schema.org 结构化数据
  schema: true
  # Open Graph
  openGraph: true
  # Twitter Cards
  twitterCards: true
  # 百度验证
  baiduVerification: ""
  # Google 验证
  googleVerification: ""