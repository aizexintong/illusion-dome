# 图片资源配置
# 集中管理站点所有图片资源
# 数据优先级: 根目录 data/assets.yaml > 主题 data/assets.yaml
# 使用方式: {{ .Site.Data.assets.avatar }}

# ========== 头像 ==========
avatar:
  # 站点头像（用于作者信息、分享等）
  url: "/headimg.jpg"
  alt: "站点头像"
  # 用于 RSS 和 Open Graph
  rss: "/headimg.jpg"

# ========== 背景图片 ==========
background:
  # 移动端背景图
  mobile:
    url: "https://t.alcy.cc/mp"
    alt: "移动端背景"

  # 桌面端背景图
  desktop:
    url: "https://t.alcy.cc/pc"
    alt: "桌面端背景"

  # 自适应背景（根据屏幕尺寸自动选择）
  adaptive:
    url: "https://t.alcy.cc/ycy"
    alt: "自适应背景"
    description: "推荐使用，自动适配不同设备"
    # 媒体查询断点
    breakpoint: "768px"

# ========== Open Graph / Twitter Card 图片 ==========
openGraph:
  # 默认分享图
  default:
    url: "https://t.alcy.cc/og"
    alt: "分享配图"
    width: 1200
    height: 630

  # 文章封面图（作为文章页面的 og:image）
  article:
    fallback: "https://t.alcy.cc/ycy"

# ========== 默认图片 ==========
defaults:
  # 文章默认封面图
  postCover: "https://t.alcy.cc/ycy"

  # 友链默认头像
  friendAvatar: "https://t.alcy.cc/tx"

  # 技能卡片图标占位
  skillIcon: "fas fa-code"

# ========== 图片服务配置 ==========
imageService:
  # 图片 CDN 域名（用于图片优化）
  cdn: "https://t.alcy.cc"
  # 是否启用图片懒加载
  lazyLoad: true
  # 是否启用响应式图片
  responsive: false