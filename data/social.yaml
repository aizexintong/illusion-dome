# 社交链接配置
# 用于页脚、移动端菜单等展示社交链接
# 数据优先级: 根目录 data/social.yaml > 主题 data/social.yaml

# 社交链接列表
links:
  - platform: "github"
    url: "https://github.com/aizexintong"
    icon: "fab fa-github"
    label: "GitHub"
    show: true

  - platform: "email"
    url: "mailto:admin@azxt.org"
    icon: "fas fa-envelope"
    label: "邮箱"
    show: true

  - platform: "rss"
    url: "/index.xml"
    icon: "fas fa-rss"
    label: "RSS 订阅"
    show: true

  - platform: "twitter"
    url: "https://twitter.com"
    icon: "fab fa-twitter"
    label: "Twitter"
    show: false

  - platform: "telegram"
    url: "https://telegram.org"
    icon: "fab fa-telegram"
    label: "Telegram"
    show: false

  - platform: "wechat"
    url: ""
    icon: "fab fa-weixin"
    label: "微信"
    show: false

# 页脚其他信息
footer:
  # ICP备案号
  icp: ""
  # 公安备案号
  police: ""
  # 版权年份（留空则自动获取当前年份）
  year: ""
  # 网站成立年份（用于显示运营时间）
  since: "2024"