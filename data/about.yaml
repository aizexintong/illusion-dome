# 关于页面配置
# 可在此文件中修改关于页面的显示内容
# 如果 content/about.md 不存在，将使用下方 content 字段的内容作为默认值

intro:
  name: "爱则心痛 (azxt)"
  title: "全栈开发者 · 技术爱好者 · 开源贡献者"
  quote: "代码如诗，技术如画。在0和1的世界里，创造无限可能。"

stats:
  - icon: "fas fa-code"
    number: "auto"  # 自动计算文章数量
    label: "技术文章"
  - icon: "fas fa-project-diagram"
    number: "auto"  # 自动计算技能数量
    label: "技术技能"
  - icon: "fas fa-calendar-alt"
    number: "8+"
    label: "开发经验"
  - icon: "fas fa-heart"
    number: "∞"
    label: "热爱程度"

philosophy:
  title: "技术理念"
  items:
    - icon: "fas fa-feather-alt"
      title: "优雅简洁"
      description: "追求代码的简洁性和可维护性，相信好的代码本身就是最好的文档"
    - icon: "fas fa-graduation-cap"
      title: "持续学习"
      description: "技术日新月异，保持好奇心和学习能力是开发者最重要的品质"
    - icon: "fas fa-share-alt"
      title: "分享共赢"
      description: "知识因分享而更有价值，开源精神推动技术进步"
    - icon: "fas fa-user-check"
      title: "用户体验"
      description: "技术服务于人，优秀的用户体验是产品的灵魂"

contact:
  title: "保持联系"
  subtitle: "如果你对我的工作感兴趣，或者有任何技术问题想要讨论"
  methods:
    - type: "email"
      icon: "fas fa-envelope"
      label: "邮箱"
      value: "admin@azxt.org"
      link: "mailto:admin@azxt.org"
    - type: "github"
      icon: "fab fa-github"
      label: "GitHub"
      value: "aizexintong"
      link: "https://github.com/aizexintong"
    - type: "website"
      icon: "fas fa-globe"
      label: "网站"
      value: "azxt.org"
      link: "https://azxt.org"
  note: "欢迎交流技术问题、项目合作或开源贡献！"